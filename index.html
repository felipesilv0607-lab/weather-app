<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aplicativo do Tempo</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="./css/style.css">

</head>

<body>

    <main class="container">

        <h1>🌤 Aplicativo do Tempo</h1>

        <!-- Pesquisa -->
        <section class="pesquisa">

            <input
                type="text"
                id="cidade"
                placeholder="Digite o nome da cidade">

            <button id="buscar">
                Buscar
            </button>

            <button id="localizacao">
                📍
            </button>

        </section>

        <!-- Loading -->
        <p id="loading" class="loading">
            Buscando informações...
        </p>

        <!-- Clima atual -->
        <section class="clima">

            <h2 id="nome-cidade">Cidade</h2>

            <canvas id="icone-clima" width="128" height="128"></canvas>
            
            <p id="temperatura">--°C</p>

            <p id="descricao">Descrição do clima</p>

            <!-- Informações -->
            <div class="informacoes">

                <div class="card-info">

                    <i class="fa-solid fa-temperature-half icone"></i>

                    <div>

                        <p class="titulo-info">Sensação</p>

                        <span id="sensacao">--°C</span>

                    </div>

                </div>

                <div class="card-info">

                    <i class="fa-solid fa-droplet icone"></i>

                    <div>

                        <p class="titulo-info">Umidade</p>

                        <span id="umidade">--%</span>

                    </div>

                </div>

                <div class="card-info">

                    <i class="fa-solid fa-wind icone"></i>

                    <div>

                        <p class="titulo-info">Vento</p>

                        <span id="vento">-- km/h</span>

                    </div>

                </div>

                <div class="card-info">

                    <i class="fa-solid fa-arrow-up icone"></i>

                    <div>

                        <p class="titulo-info">Máxima</p>

                        <span id="maxima">--°C</span>

                    </div>

                </div>

                <div class="card-info">

                    <i class="fa-solid fa-arrow-down icone"></i>

                    <div>

                        <p class="titulo-info">Mínima</p>

                        <span id="minima">--°C</span>

                    </div>

                </div>

                <div class="card-info">

                    <i class="fa-solid fa-sun icone"></i>

                    <div>

                        <p class="titulo-info">Nascer</p>

                        <span id="nascer-sol">--:--</span>

                    </div>

                </div>

                <div class="card-info">

                    <i class="fa-solid fa-moon icone"></i>

                    <div>

                        <p class="titulo-info">Pôr do Sol</p>

                        <span id="por-sol">--:--</span>

                    </div>

                </div>

            </div>

        </section>

        <!-- Previsão -->
        <section class="previsao">

            <div class="cabecalho-previsao">

                <i class="fa-solid fa-calendar-days"></i>

                <span>Próximos 5 dias</span>

            </div>

            <div id="previsao-container"></div>

        </section>

    </main>


     <script src="https://cdnjs.cloudflare.com/ajax/libs/skycons/1396634940/skycons.js"></script>

      <script type="module" src="./js/script.js"></script>


</body>

</html>
