<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aplicativo do Tempo</title>

    <link rel="stylesheet" href="./css/style.css">

</head>

<body>

    <main class="container">

        <h1>🌤 Aplicativo do Tempo</h1>

        <!-- Área de pesquisa -->
        <section class="pesquisa">

            <input
                type="text"
                id="cidade"
                placeholder="Digite o nome da cidade">

            <button id="buscar">
                Buscar
            </button>

        </section>

        <!-- Loading -->
        <p id="loading" class="loading">
            Buscando informações...
        </p>

        <!-- Resultado -->
        <section class="clima">

            <h2 id="nome-cidade">Cidade</h2>

            <img
                id="icone-clima"
                src=""
                alt="Ícone do clima">

            <p id="temperatura">--°C</p>

            <p id="descricao">Descrição do clima</p>

            <div class="informacoes">

    <div class="card-info">
        <span class="icone">🌡️</span>
        <div>
            <p class="titulo-info">Sensação</p>
            <span id="sensacao">--°C</span>
        </div>
    </div>

    <div class="card-info">
        <span class="icone">💧</span>
        <div>
            <p class="titulo-info">Umidade</p>
            <span id="umidade">--%</span>
        </div>
    </div>

    <div class="card-info">
        <span class="icone">🌬️</span>
        <div>
            <p class="titulo-info">Vento</p>
            <span id="vento">-- km/h</span>
        </div>
    </div>

    <div class="card-info">
        <span class="icone">🔺</span>
        <div>
            <p class="titulo-info">Máxima</p>
            <span id="maxima">--°C</span>
        </div>
    </div>

    <div class="card-info">
        <span class="icone">🔻</span>
        <div>
            <p class="titulo-info">Mínima</p>
            <span id="minima">--°C</span>
        </div>
    </div>

</div>

        </section>

    </main>

    <script src="./js/script.js"></script>

</body>

</html>
